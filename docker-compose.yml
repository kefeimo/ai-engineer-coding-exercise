version: '3.8'

services:
  backend:
    # Use consistent image name to share cache with dev mode
    image: rag-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override only necessary settings for Docker
      - CHROMA_PERSIST_DIRECTORY=./data/chroma_db
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
    volumes:
      # Mount data directory for persistence (at project root, shared across services)
      - ./data:/app/data
      # Cache GPT4All models to avoid re-downloading
      - ~/.cache/gpt4all:/root/.cache/gpt4all
    restart: unless-stopped
    # GPU support (requires nvidia-container-toolkit installed)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    # Use consistent image name
    image: rag-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag-frontend
    ports:
      - "5173:5173"
    environment:
      # Note: When accessing from browser (outside Docker), use localhost:8000
      # The frontend is a client-side app, so it makes requests from the user's browser
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: rag-network
